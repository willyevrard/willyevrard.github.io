<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Room Planner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f1f5f9;
        }
        /* Ocultar barra de scroll en el canvas pero permitir que se mueva */
        .canvas-area::-webkit-scrollbar { display: none; }
        .canvas-area { -ms-overflow-style: none; scrollbar-width: none; }
        
        canvas {
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden">

    <div class="w-full md:w-80 bg-white border-b md:border-r border-slate-200 flex flex-col h-1/2 md:h-full z-10 shadow-lg">
        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h1 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                <i class="fas fa-couch text-indigo-600"></i> Room Planner Pro
            </h1>
        </div>

        <div class="p-4 flex-1 overflow-y-auto space-y-4">
            
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Elemento</label>
                <select id="shapeType" onchange="toggleInputs()" class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-sm">
                    <option value="rect">Rectángulo / Mesa</option>
                    <option value="circle">Círculo / Sombrilla</option>
                    <option value="quarter">Puerta / Arco</option>
                    <option value="sun">Orientación Solar</option>
                    <option value="text">Anotación de Texto</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div id="groupW">
                    <label id="labelW" class="text-xs font-bold text-slate-500 uppercase">Ancho (cm)</label>
                    <input type="number" id="inputW" value="100" class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm">
                </div>
                <div id="groupH">
                    <label id="labelH" class="text-xs font-bold text-slate-500 uppercase">Alto (cm)</label>
                    <input type="number" id="inputH" value="100" class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm">
                </div>
            </div>

            <div id="groupText">
                <label class="text-xs font-bold text-slate-500 uppercase">Texto / Nombre</label>
                <input type="text" id="inputText" value="Objeto" class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm">
            </div>

            <div id="groupColor">
                <label class="text-xs font-bold text-slate-500 uppercase">Color</label>
                <div class="grid grid-cols-5 gap-2 mt-1">
                    <button class="w-full h-8 rounded-md bg-indigo-500/60 border-2 border-indigo-600" onclick="setColor('rgba(99, 102, 241, 0.6)')"></button>
                    <button class="w-full h-8 rounded-md bg-emerald-500/60" onclick="setColor('rgba(16, 185, 129, 0.6)')"></button>
                    <button class="w-full h-8 rounded-md bg-rose-500/60" onclick="setColor('rgba(239, 68, 68, 0.6)')"></button>
                    <button class="w-full h-8 rounded-md bg-amber-500/60" onclick="setColor('rgba(245, 158, 11, 0.6)')"></button>
                    <button class="w-full h-8 rounded-md bg-slate-400/60" onclick="setColor('rgba(148, 163, 184, 0.6)')"></button>
                </div>
                <input type="hidden" id="inputColor" value="rgba(99, 102, 241, 0.6)">
            </div>

            <button onclick="addShape()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-3 rounded-lg transition-colors text-sm flex items-center justify-center gap-2">
                <i class="fas fa-plus"></i> Añadir al Canvas
            </button>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="deleteSelected()" class="bg-slate-100 hover:bg-rose-100 hover:text-rose-600 text-slate-600 font-bold p-2.5 rounded-lg transition-colors text-xs">
                    <i class="fas fa-trash-alt mr-1"></i> Borrar
                </button>
                <button onclick="resetDefault()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold p-2.5 rounded-lg transition-colors text-xs">
                    <i class="fas fa-undo mr-1"></i> Reiniciar
                </button>
            </div>

            <hr class="border-slate-100">

            <div class="grid grid-cols-2 gap-2">
                <button onclick="saveLayout()" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold p-2.5 rounded-lg transition-colors text-xs">
                    <i class="fas fa-save mr-1"></i> Guardar
                </button>
                <button onclick="document.getElementById('loadFile').click()" class="bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold p-2.5 rounded-lg transition-colors text-xs">
                    <i class="fas fa-folder-open mr-1"></i> Abrir
                </button>
            </div>
            
            <button onclick="exportImage()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold p-2.5 rounded-lg transition-colors text-xs">
                <i class="fas fa-file-image mr-1"></i> Exportar como Imagen
            </button>

            <input type="file" id="loadFile" class="hidden" onchange="loadLayout(this)" accept=".json">

            <div class="bg-amber-50 p-3 rounded-lg border border-amber-100">
                <p class="text-xs text-amber-700"><i class="fas fa-lightbulb mr-1"></i> <strong>Tip:</strong> Toca un objeto para seleccionarlo. Arrástralo para moverlo y usa el <strong>tirador superior</strong> para rotarlo.</p>
            </div>
        </div>
    </div>

    <div class="flex-1 bg-slate-100 p-4 flex justify-center items-center overflow-auto canvas-area relative h-1/2 md:h-full">
        
        <div class="absolute top-6 right-6 flex flex-col gap-2 z-10">
            <button onclick="zoomIn()" class="w-10 h-10 bg-white rounded-lg shadow-md flex items-center justify-center text-slate-600 hover:bg-slate-50 transition-colors">
                <i class="fas fa-plus"></i>
            </button>
            <button onclick="zoomOut()" class="w-10 h-10 bg-white rounded-lg shadow-md flex items-center justify-center text-slate-600 hover:bg-slate-50 transition-colors">
                <i class="fas fa-minus"></i>
            </button>
            <div id="zoomText" class="bg-white px-2 py-1 rounded shadow-sm text-xs font-bold text-slate-500 text-center">100%</div>
        </div>

        <canvas id="gridCanvas" width="800" height="800"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        
        // El factor de escala original: 1px = 0.5cm (es decir, 2px por cada cm).
        const BASE_SCALE = 2; 
        const GRID_SIZE = 10; // Un cuadro cada 10cm
        
        let zoom = 1.0; // Factor de zoom dinámico
        let shapes = [];
        let selectedIndex = -1;
        let isDragging = false;
        let isRotating = false;
        let dragOffset = { x: 0, y: 0 };
        
        // Cambiar color activo
        function setColor(color) {
            document.getElementById('inputColor').value = color;
            const buttons = document.querySelectorAll('#groupColor button');
            buttons.forEach(btn => btn.style.border = 'none');
            event.target.style.border = '2px solid #4f46e5';
            
            if (selectedIndex >= 0) {
                shapes[selectedIndex].fill = color;
                draw();
            }
        }

        function zoomIn() { if (zoom < 2.5) { zoom += 0.1; draw(); updateZoomLabel(); } }
        function zoomOut() { if (zoom > 0.4) { zoom -= 0.1; draw(); updateZoomLabel(); } }
        function updateZoomLabel() {
            document.getElementById('zoomText').innerText = Math.round(zoom * 100) + '%';
        }

        // Diseño predeterminado basado en tus medidas reales
        function resetDefault() {
            shapes = [
                // Base del Balcón (230cm x 310cm)
                { type: 'rect', x: 200, y: 200, w: 230, h: 310, fill: 'rgba(230, 230, 230, 0.4)', stroke: '#64748b', label: 'Balcón Principal', angle: 0 },
                
                // Pilares izquierdos (45cm x 20cm)
                { type: 'rect', x: 102.5, y: 65, w: 45, h: 20, fill: 'rgba(148, 163, 184, 0.8)', stroke: '#475569', label: 'Pilar', angle: 0 },
                { type: 'rect', x: 102.5, y: 335, w: 45, h: 20, fill: 'rgba(148, 163, 184, 0.8)', stroke: '#475569', label: 'Pilar', angle: 0 },
                
                // Huecos/Sombras pared derecha (30cm de grosor, 80cm y 70cm de largo)
                { type: 'rect', x: 300, y: 85, w: 30, h: 80, fill: 'rgba(209, 213, 219, 0.8)', stroke: '#475569', label: 'Hueco', angle: 0 },
                { type: 'rect', x: 300, y: 315, w: 30, h: 70, fill: 'rgba(209, 213, 219, 0.8)', stroke: '#475569', label: 'Hueco', angle: 0 },
                
                // Puertas en la derecha que abren hacia adentro
                { type: 'quarter', x: 315, y: 165, r: 40, fill: 'none', stroke: '#ef4444', label: 'Puerta', angle: 180 },
                { type: 'quarter', x: 315, y: 205, r: 40, fill: 'none', stroke: '#ef4444', label: 'Puerta', angle: 180 },
                
                // Un sol para la orientación
                { type: 'sun', x: 400, y: 250, r: 25, fill: 'rgba(245, 158, 11, 0.6)', stroke: '#b45309', label: 'Sol de Tarde', angle: 225 }
            ];
            selectedIndex = -1;
            draw();
        }

        function toggleInputs() {
            const type = document.getElementById('shapeType').value;
            const groupW = document.getElementById('groupW');
            const groupH = document.getElementById('groupH');
            const labelW = document.getElementById('labelW');
            
            groupW.classList.remove('hidden');
            groupH.classList.remove('hidden');
            
            if (type === 'circle' || type === 'quarter') {
                groupH.classList.add('hidden');
                labelW.innerText = 'Radio (cm)';
            } else if (type === 'sun') {
                groupH.classList.add('hidden');
                labelW.innerText = 'Tamaño (cm)';
                document.getElementById('inputText').value = "Dirección Sol";
            } else if (type === 'text') {
                groupW.classList.add('hidden');
                groupH.classList.add('hidden');
                document.getElementById('inputText').value = "Anotación";
            } else {
                labelW.innerText = 'Ancho (cm)';
            }
        }

        function addShape() {
            const type = document.getElementById('shapeType').value;
            const w = parseFloat(document.getElementById('inputW').value);
            const h = parseFloat(document.getElementById('inputH').value);
            const text = document.getElementById('inputText').value;
            const fill = document.getElementById('inputColor').value;
            
            let newShape = { type, x: 200, y: 200, label: text, fill, stroke: '#334155', angle: 0 };
            
            if (type === 'rect') { newShape.w = w; newShape.h = h; }
            else if (type === 'circle' || type === 'quarter' || type === 'sun') { newShape.r = w; }
            
            shapes.push(newShape);
            draw();
        }

        function deleteSelected() {
            if (selectedIndex >= 0) {
                shapes.splice(selectedIndex, 1);
                selectedIndex = -1;
                draw();
            }
        }

        // --- MANEJO DE FICHEROS ---
        function saveLayout() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(shapes));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "layout_room.json");
            downloadAnchor.click();
        }

        function loadLayout(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const loadedShapes = JSON.parse(e.target.result);
                    if (Array.isArray(loadedShapes)) {
                        shapes = loadedShapes;
                        selectedIndex = -1;
                        draw();
                    }
                } catch (err) { alert("Error al cargar."); }
            };
            reader.readAsText(file);
        }

        function exportImage() {
            const tempSelected = selectedIndex;
            selectedIndex = -1;
            draw();
            const image = canvas.toDataURL("image/png");
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", image);
            downloadAnchor.setAttribute("download", "balcon_layout.png");
            downloadAnchor.click();
            selectedIndex = tempSelected;
            draw();
        }

        // --- MOTOR DE RENDERIZADO DEL CANVAS ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            // Aplicar el zoom
            ctx.scale(zoom, zoom);

            // 1. Dibujar Cuadrícula
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width / zoom; x += GRID_SIZE * BASE_SCALE) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height / zoom); ctx.stroke();
            }
            for (let y = 0; y < canvas.height / zoom; y += GRID_SIZE * BASE_SCALE) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width / zoom, y); ctx.stroke();
            }
            
            // 2. Dibujar Elementos
            shapes.forEach((s, index) => {
                ctx.save();
                
                const px = s.x * BASE_SCALE;
                const py = s.y * BASE_SCALE;
                
                ctx.translate(px, py);
                ctx.rotate((s.angle * Math.PI) / 180);
                
                ctx.fillStyle = s.fill;
                ctx.strokeStyle = index === selectedIndex ? '#4f46e5' : s.stroke;
                ctx.lineWidth = index === selectedIndex ? 3 : 1.5;
                
                ctx.beginPath();
                
                let ph = 0; // Para calcular la altura del tirador
                
                if (s.type === 'rect') {
                    const pw = s.w * BASE_SCALE;
                    ph = s.h * BASE_SCALE;
                    if (s.fill !== 'none') ctx.fillRect(-pw/2, -ph/2, pw, ph);
                    ctx.strokeRect(-pw/2, -ph/2, pw, ph);
                    
                    ctx.fillStyle = '#1e293b';
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(s.label, 0, 4);
                } 
                else if (s.type === 'circle') {
                    const pr = s.r * BASE_SCALE;
                    ph = pr * 2;
                    ctx.arc(0, 0, pr, 0, Math.PI * 2);
                    if (s.fill !== 'none') ctx.fill();
                    ctx.stroke();
                    
                    ctx.fillStyle = '#1e293b';
                    ctx.textAlign = 'center';
                    ctx.fillText(s.label, 0, 4);
                }
                else if (s.type === 'quarter') {
                    const pr = s.r * BASE_SCALE;
                    ph = pr;
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, pr, 0, Math.PI / 2);
                    ctx.closePath();
                    if (s.fill !== 'none') ctx.fill();
                    ctx.stroke();
                    
                    ctx.fillStyle = '#1e293b';
                    ctx.fillText(s.label, pr/3, pr/3);
                }
                else if (s.type === 'sun') {
                    const pr = s.r * BASE_SCALE;
                    ph = pr * 2;
                    ctx.arc(0, 0, pr, 0, Math.PI * 2);
                    ctx.fill(); ctx.stroke();
                    // Rayos
                    for (let i = 0; i < 8; i++) {
                        ctx.rotate(Math.PI / 4);
                        ctx.moveTo(0, pr + 2); ctx.lineTo(0, pr + 8);
                    }
                    ctx.stroke();
                    // Flecha
                    ctx.beginPath();
                    ctx.moveTo(0, 0); ctx.lineTo(0, pr + 20);
                    ctx.lineTo(-5, pr + 12); ctx.moveTo(0, pr + 20); ctx.lineTo(5, pr + 12);
                    ctx.stroke();
                    
                    ctx.fillStyle = '#1e293b';
                    ctx.textAlign = 'center';
                    ctx.fillText(s.label, 0, pr + 32);
                }
                else if (s.type === 'text') {
                    ctx.fillStyle = '#0f172a';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(s.label, 0, 5);
                    ph = 30; // Altura estimada para el tirador
                }

                // Dibujar el tirador de rotación si el elemento está seleccionado
                if (index === selectedIndex) {
                    ctx.strokeStyle = '#4f46e5';
                    ctx.lineWidth = 1.5;
                    ctx.fillStyle = '#ffffff';

                    // Distancia hacia arriba
                    let handleOffset = -ph/2 - 25;
                    if(s.type === 'quarter' || s.type === 'text') handleOffset = -35;

                    ctx.beginPath();
                    ctx.moveTo(0, -ph/2);
                    ctx.lineTo(0, handleOffset);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.arc(0, handleOffset, 7, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    
                    // Flecha circular indicando rotación en el tirador
                    ctx.fillStyle = '#4f46e5';
                    ctx.font = '10px FontAwesome';
                    ctx.textAlign = 'center';
                    ctx.fillText('\uf01e', 0, handleOffset + 3);
                }
                
                ctx.restore();
            });
            ctx.restore();
        }

        // --- SISTEMA DE INTERACCIÓN: MOVER Y ROTAR ---
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Revertimos escala de zoom y escala base para tener las coordenadas originales en "cm"
            return {
                x: (clientX - rect.left) / zoom / BASE_SCALE,
                y: (clientY - rect.top) / zoom / BASE_SCALE
            };
        }

        function handleStart(e) {
            const pos = getPointerPos(e);
            
            // Si hay un objeto seleccionado, primero comprobamos si hemos pulsado el tirador de rotación
            if (selectedIndex >= 0) {
                const s = shapes[selectedIndex];
                const dx = pos.x - s.x;
                const dy = pos.y - s.y;
                const rad = -s.angle * Math.PI / 180;
                
                // Convertir la posición de click a coordenadas locales del objeto para el tirador
                const localX = dx * Math.cos(rad) - dy * Math.sin(rad);
                const localY = dx * Math.sin(rad) + dy * Math.cos(rad);
                
                let ph = (s.type === 'rect') ? s.h : (s.type === 'circle' || s.type === 'sun') ? s.r * 2 : 50;
                let handleOffset = -ph/2 - 25/BASE_SCALE;
                if (s.type === 'quarter' || s.type === 'text') handleOffset = -35 / BASE_SCALE;

                const distToHandle = Math.sqrt(localX**2 + (localY - handleOffset)**2);
                
                if (distToHandle <= 15 / BASE_SCALE) {
                    isRotating = true;
                    return;
                }
            }

            // Si no fue el tirador, buscamos si pulsamos una forma para moverla
            selectedIndex = -1;
            for (let i = shapes.length - 1; i >= 0; i--) {
                const s = shapes[i];
                const dist = Math.sqrt((pos.x - s.x)**2 + (pos.y - s.y)**2);
                
                if (s.type === 'rect') {
                    if (pos.x >= s.x - s.w/2 && pos.x <= s.x + s.w/2 && pos.y >= s.y - s.h/2 && pos.y <= s.y + s.h/2) {
                        selectedIndex = i; break;
                    }
                } else if (s.type === 'circle' || s.type === 'quarter' || s.type === 'sun') {
                    if (dist <= s.r) { selectedIndex = i; break; }
                } else if (s.type === 'text') {
                    if (dist <= 25) { selectedIndex = i; break; }
                }
            }
            
            if (selectedIndex >= 0) {
                isDragging = true;
                dragOffset.x = pos.x - shapes[selectedIndex].x;
                dragOffset.y = pos.y - shapes[selectedIndex].y;
                
                // Actualizar sidebar con los datos del objeto
                const s = shapes[selectedIndex];
                document.getElementById('shapeType').value = s.type;
                toggleInputs();
                document.getElementById('inputText').value = s.label;
            }
            draw();
        }

        function handleMove(e) {
            if (!isDragging && !isRotating) return;
            e.preventDefault(); 
            const pos = getPointerPos(e);
            const s = shapes[selectedIndex];
            
            if (isDragging) {
                // Movimiento con rejilla imantada de 10cm
                s.x = Math.round((pos.x - dragOffset.x) / GRID_SIZE) * GRID_SIZE;
                s.y = Math.round((pos.y - dragOffset.y) / GRID_SIZE) * GRID_SIZE;
            } else if (isRotating) {
                // Cálculo del ángulo según la posición del ratón
                const dx = pos.x - s.x;
                const dy = pos.y - s.y;
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                s.angle = angle + 90; // +90 porque el tirador nace en el eje negativo (arriba)
            }
            draw();
        }

        function handleEnd() { isDragging = false; isRotating = false; }

        // Listeners tanto para PC como táctiles
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        canvas.addEventListener('touchstart', handleStart);
        canvas.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleEnd);

        // Inputs en tiempo real
        document.getElementById('inputText').addEventListener('input', function(e) {
            if (selectedIndex >= 0) { shapes[selectedIndex].label = e.target.value; draw(); }
        });

        toggleInputs();
        resetDefault();
    </script>
</body>
</html>
