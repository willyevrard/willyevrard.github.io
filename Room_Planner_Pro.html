<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Planner Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5; /* Indigo-600 to match your index.html */
            --primary-hover: #4338ca;
            --sidebar-bg: #f9fafb;
            --canvas-bg: #ffffff;
            --border: #e5e7eb;
            --text-main: #1f2937;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--sidebar-bg);
            color: var(--text-main);
        }
        #sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }
        .sidebar-header {
            padding: 20px;
            background: var(--primary);
            color: white;
            text-align: center;
        }
        .sidebar-header h2 { margin: 0; font-size: 20px; font-weight: 600; }
        .sidebar-content {
            padding: 15px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .shape-btn {
            padding: 12px;
            background: white;
            border: 1px solid var(--border);
            cursor: pointer;
            text-align: center;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 500;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .shape-btn:hover { background: #f3f4f6; border-color: #d1d5db; transform: translateY(-1px); }
        .section-title { font-size: 12px; text-transform: uppercase; color: #6b7280; font-weight: 700; margin-top: 15px; letter-spacing: 0.05em; }
        
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #toolbar {
            height: 60px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            z-index: 10;
        }
        .btn {
            padding: 8px 16px;
            background: white;
            color: #374151;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover { background: #f3f4f6; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { color: #dc2626; border-color: #fca5a5; }
        .btn-danger:hover { background: #fef2f2; }
        .btn.active { background: #e0e7ff; border-color: #c7d2fe; color: var(--primary); }
        
        #canvas-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: #f9fafb;
            /* Blueprint grid pattern */
            background-image: 
                linear-gradient(#e5e7eb 1px, transparent 1px),
                linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: center center;
        }
        canvas { display: block; }
        
        .instructions {
            padding: 15px;
            background: #f3f4f6;
            font-size: 13px;
            color: #4b5563;
            border-top: 1px solid var(--border);
            line-height: 1.5;
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" style="color: white; text-decoration: none; font-size: 12px; display: block; text-align: left; margin-bottom: 5px;">← Volver</a>
            <h2>Room Planner Pro</h2>
        </div>
        <div class="sidebar-content">
            <div class="section-title">Estructura</div>
            <div class="shape-btn" onclick="addShape('wall')">⬛ Muro</div>
            <div class="shape-btn" onclick="addShape('room')">⬜ Habitación (Fondo)</div>
            <div class="shape-btn" onclick="addShape('door')">🚪 Puerta</div>
            <div class="shape-btn" onclick="addShape('window')">🪟 Ventana</div>
            
            <div class="section-title">Mobiliario</div>
            <div class="shape-btn" onclick="addShape('table')">🪑 Mesa</div>
            <div class="shape-btn" onclick="addShape('chair')">💺 Silla</div>
            <div class="shape-btn" onclick="addShape('bed')">🛏️ Cama</div>
            <div class="shape-btn" onclick="addShape('sofa')">🛋️ Sofá</div>
        </div>
        <div class="instructions">
            <b>Atajos de Teclado:</b><br>
            • <b>Alt + Arrastrar</b>: Mover vista (Pan)<br>
            • <b>Rueda Ratón</b>: Zoom +/-<br>
            • <b>Ctrl+C / Ctrl+V</b>: Copiar & Pegar<br>
            • <b>Supr / Backspace</b>: Borrar<br>
            • <b>L</b>: Bloquear/Anclar objeto
        </div>
    </div>

    <div id="main">
        <div id="toolbar">
            <button class="btn btn-primary" onclick="saveDesign()">💾 Guardar (JSON)</button>
            <button class="btn" onclick="document.getElementById('fileInput').click()">📂 Cargar (JSON)</button>
            <input type="file" id="fileInput" accept=".json" onchange="loadDesign(event)">
            
            <div style="width: 1px; height: 30px; background: var(--border); margin: 0 10px;"></div>

            <button class="btn" id="dimBtn" onclick="toggleDimensions()">📏 Mostrar Dimensiones</button>
            <button class="btn" id="lockBtn" onclick="toggleLock()">🔒 Anclar (Lock)</button>
            <button class="btn btn-danger" onclick="deleteSelected()">🗑️ Eliminar</button>
        </div>
        <div id="canvas-wrapper">
            <canvas id="c"></canvas>
        </div>
    </div>

    <script>
        // --- Initialization ---
        const wrapper = document.getElementById('canvas-wrapper');
        const canvas = new fabric.Canvas('c', {
            width: wrapper.clientWidth,
            height: wrapper.clientHeight,
            selection: true,
            preserveObjectStacking: true
        });

        // Resize canvas on window resize
        window.addEventListener('resize', () => {
            canvas.setWidth(wrapper.clientWidth);
            canvas.setHeight(wrapper.clientHeight);
            canvas.renderAll();
        });

        let showDimensions = false;
        let _clipboard = null;

        // --- Grid Snapping (20px) ---
        const grid = 20;
        canvas.on('object:moving', function(options) {
            options.target.set({
                left: Math.round(options.target.left / grid) * grid,
                top: Math.round(options.target.top / grid) * grid
            });
        });

        // --- Shape Library ---
        function addShape(type) {
            let obj;
            const center = canvas.getVpCenter();
            const common = {
                left: center.x,
                top: center.y,
                originX: 'center',
                originY: 'center',
                transparentCorners: false,
                cornerColor: '#4f46e5',
                cornerStrokeColor: '#4f46e5',
                borderColor: '#4f46e5',
                cornerSize: 10,
                padding: 0,
                cornerStyle: 'circle',
                borderDashArray: [4, 4]
            };

            switch(type) {
                case 'wall':
                    obj = new fabric.Rect({ ...common, width: 200, height: 20, fill: '#374151', label: 'Wall' });
                    break;
                case 'room':
                    obj = new fabric.Rect({ ...common, width: 300, height: 300, fill: '#f3f4f6', stroke: '#9ca3af', strokeWidth: 2, label: 'Room Floor', rx: 5, ry: 5 });
                    canvas.sendToBack(obj);
                    break;
                case 'door':
                    obj = new fabric.Rect({ ...common, width: 60, height: 10, fill: '#b45309', label: 'Door' });
                    break;
                case 'window':
                    obj = new fabric.Rect({ ...common, width: 100, height: 10, fill: '#bfdbfe', stroke: '#3b82f6', strokeWidth: 2, label: 'Window' });
                    break;
                case 'table':
                    obj = new fabric.Rect({ ...common, width: 120, height: 80, fill: '#d97706', rx: 10, ry: 10, label: 'Table' });
                    break;
                case 'chair':
                    obj = new fabric.Circle({ ...common, radius: 25, fill: '#10b981', label: 'Chair' });
                    break;
                case 'bed':
                    obj = new fabric.Rect({ ...common, width: 140, height: 200, fill: '#8b5cf6', rx: 5, ry: 5, label: 'Bed' });
                    break;
                case 'sofa':
                    obj = new fabric.Rect({ ...common, width: 200, height: 80, fill: '#ec4899', rx: 15, ry: 15, label: 'Sofa' });
                    break;
            }

            if (obj) {
                // Add a custom attribute to identify it for JSON export
                obj.toObject = (function(toObject) {
                    return function() {
                        return fabric.util.object.extend(toObject.call(this), { label: this.label });
                    };
                })(obj.toObject);

                canvas.add(obj);
                canvas.setActiveObject(obj);
            }
        }

        // --- Dimensions Display ---
        function toggleDimensions() {
            showDimensions = !showDimensions;
            const btn = document.getElementById('dimBtn');
            if (showDimensions) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
            canvas.requestRenderAll();
        }

        // Draw dimensions dynamically on the canvas
        canvas.on('after:render', function() {
            if (!showDimensions) return;
            const ctx = canvas.contextContainer;
            ctx.font = '12px Arial';
            ctx.fillStyle = '#dc2626';
            ctx.textAlign = 'center';
            
            const objects = canvas.getObjects();
            objects.forEach(obj => {
                if (obj.label === 'Room Floor' || obj.width === undefined) return; // Skip floor or circles for simplicity
                
                // Get absolute coordinates
                const bound = obj.getBoundingRect();
                
                // Real width/height based on scaling
                const w = Math.round(obj.getScaledWidth());
                const h = Math.round(obj.getScaledHeight());
                
                // Draw text above and to the right
                ctx.fillText(`${w} cm`, bound.left + bound.width / 2, bound.top - 5);
                
                ctx.save();
                ctx.translate(bound.left + bound.width + 15, bound.top + bound.height / 2);
                ctx.rotate(-Math.PI / 2);
                ctx.fillText(`${h} cm`, 0, 0);
                ctx.restore();
            });
        });

        // --- Navigation (Pan & Zoom) ---
        canvas.on('mouse:wheel', function(opt) {
            const delta = opt.e.deltaY;
            let zoom = canvas.getZoom();
            zoom *= 0.999 ** delta;
            if (zoom > 5) zoom = 5;
            if (zoom < 0.2) zoom = 0.2;
            canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
            opt.e.preventDefault();
            opt.e.stopPropagation();
        });

        canvas.on('mouse:down', function(opt) {
            const evt = opt.e;
            if (evt.altKey === true) {
                this.isDragging = true;
                this.selection = false;
                this.lastPosX = evt.clientX;
                this.lastPosY = evt.clientY;
            }
        });

        canvas.on('mouse:move', function(opt) {
            if (this.isDragging) {
                const e = opt.e;
                const vpt = this.viewportTransform;
                vpt[4] += e.clientX - this.lastPosX;
                vpt[5] += e.clientY - this.lastPosY;
                this.requestRenderAll();
                this.lastPosX = e.clientX;
                this.lastPosY = e.clientY;
            }
        });

        canvas.on('mouse:up', function(opt) {
            this.setViewportTransform(this.viewportTransform);
            this.isDragging = false;
            this.selection = true;
        });

        // --- Object Locking (Anchor) ---
        function toggleLock() {
            const activeObject = canvas.getActiveObject();
            const activeGroup = canvas.getActiveObjects();
            
            if (activeGroup.length === 0) return;

            activeGroup.forEach(obj => {
                const isLocked = obj.lockMovementX; // Check current state
                obj.set({
                    lockMovementX: !isLocked,
                    lockMovementY: !isLocked,
                    lockRotation: !isLocked,
                    lockScalingX: !isLocked,
                    lockScalingY: !isLocked,
                    hasControls: isLocked, // hide controls when locked
                    borderColor: !isLocked ? '#ef4444' : '#4f46e5'
                });
                
                // Visual cue for locked objects
                if(!isLocked) {
                    obj.set('stroke', '#ef4444');
                    obj.set('strokeWidth', 3);
                    obj.set('strokeDashArray', null);
                } else {
                    obj.set('stroke', obj.label === 'Room Floor' ? '#9ca3af' : null);
                    obj.set('strokeWidth', obj.label === 'Room Floor' ? 2 : 1);
                }
            });
            canvas.discardActiveObject();
            canvas.requestRenderAll();
        }

        // --- Actions & Hotkeys ---
        function deleteSelected() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) {
                    if (!object.lockMovementX) { // Don't delete locked objects easily
                        canvas.remove(object);
                    }
                });
            }
        }

        function copy() {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                activeObject.clone(function(cloned) {
                    _clipboard = cloned;
                });
            }
        }

        function paste() {
            if (!_clipboard) return;
            _clipboard.clone(function(clonedObj) {
                canvas.discardActiveObject();
                clonedObj.set({
                    left: clonedObj.left + 20,
                    top: clonedObj.top + 20,
                    evented: true,
                });
                if (clonedObj.type === 'activeSelection') {
                    clonedObj.canvas = canvas;
                    clonedObj.forEachObject(function(obj) {
                        canvas.add(obj);
                    });
                    clonedObj.setCoords();
                } else {
                    canvas.add(clonedObj);
                }
                _clipboard.top += 20;
                _clipboard.left += 20;
                canvas.setActiveObject(clonedObj);
                canvas.requestRenderAll();
            });
        }

        // Global Keyboard Listeners
        window.addEventListener('keydown', function(e) {
            // Check if user is typing in an input (not applicable here, but good practice)
            if (e.target.tagName.toLowerCase() === 'input') return;

            if (e.ctrlKey && (e.key === 'c' || e.key === 'C')) { e.preventDefault(); copy(); }
            if (e.ctrlKey && (e.key === 'v' || e.key === 'V')) { e.preventDefault(); paste(); }
            if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSelected(); }
            if (e.key === 'l' || e.key === 'L') { toggleLock(); }
        });

        // --- Save / Load ---
        function saveDesign() {
            const json = JSON.stringify(canvas.toJSON(['label', 'lockMovementX', 'lockMovementY', 'lockRotation', 'lockScalingX', 'lockScalingY', 'hasControls']));
            const blob = new Blob([json], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'RoomLayout.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function loadDesign(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(f) {
                const data = f.target.result;
                canvas.loadFromJSON(data, canvas.renderAll.bind(canvas), function(o, object) {
                    // Re-apply customizations if needed
                });
            };
            reader.readAsText(file);
            // Reset input
            event.target.value = '';
        }

    </script>
</body>
</html>
