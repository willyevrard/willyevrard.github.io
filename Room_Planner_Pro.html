<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Room Planner Pro - Desktop Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: ui-sans-serif, system-ui, sans-serif; background-color: #f1f5f9; }
        .canvas-area::-webkit-scrollbar { display: none; }
        canvas {
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            cursor: grab;
            background-color: white;
        }
        canvas:active { cursor: grabbing; }
        input:focus { border-color: #4f46e5 !important; ring: 2px #4f46e5; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden">

    <div class="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col h-1/2 md:h-full z-10 shadow-lg">
        <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
            <h1 class="text-lg font-bold text-slate-800"><i class="fas fa-drafting-compass text-indigo-600 mr-2"></i>Editor</h1>
            <span class="text-[10px] bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full font-bold">PRO</span>
        </div>

        <div class="p-4 flex-1 overflow-y-auto space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Tipo de Elemento</label>
                <select id="shapeType" onchange="toggleInputs()" class="w-full mt-1 p-2 border rounded-lg text-sm outline-none">
                    <option value="rect">Rectángulo / Mesa</option>
                    <option value="circle">Círculo / Maceta</option>
                    <option value="quarter">Puerta / Arco</option>
                    <option value="sun">Orientación Solar</option>
                    <option value="text">Texto Libre</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div id="groupW">
                    <label id="labelW" class="text-xs font-bold text-slate-500 uppercase">Ancho (cm)</label>
                    <input type="number" id="inputW" value="100" class="w-full mt-1 p-2 border rounded-lg text-sm update-trigger">
                </div>
                <div id="groupH">
                    <label id="labelH" class="text-xs font-bold text-slate-500 uppercase">Alto (cm)</label>
                    <input type="number" id="inputH" value="100" class="w-full mt-1 p-2 border rounded-lg text-sm update-trigger">
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Etiqueta</label>
                <input type="text" id="inputText" value="Nuevo Objeto" class="w-full mt-1 p-2 border rounded-lg text-sm update-trigger">
            </div>

            <button onclick="addShape()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-3 rounded-lg transition-all text-sm">
                <i class="fas fa-plus mr-2"></i>Añadir Objeto
            </button>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="deleteSelected()" class="bg-slate-100 hover:bg-rose-100 hover:text-rose-600 text-slate-600 p-2 rounded-lg text-xs font-bold">
                    <i class="fas fa-trash-alt"></i> Borrar
                </button>
                <button onclick="resetDefault()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 p-2 rounded-lg text-xs font-bold">
                    <i class="fas fa-sync"></i> Reset
                </button>
            </div>

            <div class="p-3 bg-slate-50 rounded-lg border border-slate-200 space-y-1">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Atajos de teclado</p>
                <div class="flex justify-between text-[11px] text-slate-600"><span>Copiar/Pegar</span><span class="font-mono bg-white px-1 border rounded">Ctrl+C / V</span></div>
                <div class="flex justify-between text-[11px] text-slate-600"><span>Cortar/Borrar</span><span class="font-mono bg-white px-1 border rounded">Ctrl+X / Del</span></div>
            </div>
        </div>
    </div>

    <div class="flex-1 bg-slate-200 p-8 flex justify-center items-center overflow-auto canvas-area relative">
        <div class="absolute top-6 right-6 flex flex-col gap-2 shadow-sm">
            <button onclick="zoomIn()" class="w-10 h-10 bg-white rounded-t-lg border-b border-slate-100 flex items-center justify-center hover:bg-slate-50"><i class="fas fa-plus"></i></button>
            <button onclick="zoomOut()" class="w-10 h-10 bg-white rounded-b-lg flex items-center justify-center hover:bg-slate-50"><i class="fas fa-minus"></i></button>
        </div>
        <canvas id="gridCanvas" width="1000" height="1000"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const BASE_SCALE = 2; 
        const GRID_SIZE = 10;
        
        let zoom = 1.0;
        let shapes = [];
        let selectedIndex = -1;
        let isDragging = false, isRotating = false;
        let dragOffset = { x: 0, y: 0 };
        let clipboard = null;

        // --- CORRECCIÓN: AUTO-AJUSTE AL CAMBIAR INPUTS ---
        document.querySelectorAll('.update-trigger').forEach(input => {
            input.addEventListener('input', updateSelectedFromInputs);
            input.addEventListener('keydown', (e) => {
                if(e.key === 'Enter') { updateSelectedFromInputs(); input.blur(); }
            });
        });

        function updateSelectedFromInputs() {
            if (selectedIndex === -1) return;
            const s = shapes[selectedIndex];
            const type = document.getElementById('shapeType').value;
            s.label = document.getElementById('inputText').value;
            
            if (s.type === 'rect') {
                s.w = parseFloat(document.getElementById('inputW').value) || 10;
                s.h = parseFloat(document.getElementById('inputH').value) || 10;
            } else if (['circle', 'quarter', 'sun'].includes(s.type)) {
                s.r = parseFloat(document.getElementById('inputW').value) || 10;
            }
            draw();
        }

        // --- ATAJOS DE TECLADO ---
        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return; // No interferir si se escribe en un input

            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'c') copySelected();
                if (e.key === 'v') pasteObject();
                if (e.key === 'x') { copySelected(); deleteSelected(); }
            }
            if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
        });

        function copySelected() {
            if (selectedIndex >= 0) clipboard = JSON.stringify(shapes[selectedIndex]);
        }

        function pasteObject() {
            if (!clipboard) return;
            let newObj = JSON.parse(clipboard);
            newObj.x += 20; newObj.y += 20; // Desplazar un poco para ver que se pegó
            shapes.push(newObj);
            selectedIndex = shapes.length - 1;
            syncInputsToSelected();
            draw();
        }

        function syncInputsToSelected() {
            if (selectedIndex === -1) return;
            const s = shapes[selectedIndex];
            document.getElementById('shapeType').value = s.type;
            document.getElementById('inputText').value = s.label;
            if (s.w) document.getElementById('inputW').value = s.w;
            if (s.h) document.getElementById('inputH').value = s.h;
            if (s.r) document.getElementById('inputW').value = s.r;
            toggleInputs();
        }

        function zoomIn() { zoom += 0.1; draw(); }
        function zoomOut() { zoom = Math.max(0.2, zoom - 0.1); draw(); }

        function toggleInputs() {
            const type = document.getElementById('shapeType').value;
            document.getElementById('groupH').style.display = (['circle', 'quarter', 'sun', 'text'].includes(type)) ? 'none' : 'block';
            document.getElementById('groupW').style.display = (type === 'text') ? 'none' : 'block';
            document.getElementById('labelW').innerText = (['circle', 'quarter', 'sun'].includes(type)) ? 'Radio (cm)' : 'Ancho (cm)';
        }

        function addShape() {
            const type = document.getElementById('shapeType').value;
            const w = parseFloat(document.getElementById('inputW').value);
            const h = parseFloat(document.getElementById('inputH').value);
            let shape = { type, x: 250, y: 250, label: document.getElementById('inputText').value, fill: 'rgba(99, 102, 241, 0.5)', stroke: '#4338ca', angle: 0 };
            if (type === 'rect') { shape.w = w; shape.h = h; }
            else if (['circle', 'quarter', 'sun'].includes(type)) shape.r = w;
            shapes.push(shape);
            selectedIndex = shapes.length - 1;
            draw();
        }

        function deleteSelected() { if (selectedIndex >= 0) { shapes.splice(selectedIndex, 1); selectedIndex = -1; draw(); } }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(zoom, zoom);

            shapes.forEach((s, i) => {
                ctx.save();
                ctx.translate(s.x * BASE_SCALE, s.y * BASE_SCALE);
                ctx.rotate(s.angle * Math.PI / 180);
                
                ctx.fillStyle = s.fill;
                ctx.strokeStyle = (i === selectedIndex) ? '#4f46e5' : s.stroke;
                ctx.lineWidth = (i === selectedIndex) ? 4 : 2;

                ctx.beginPath();
                if (s.type === 'rect') {
                    ctx.rect(-s.w*BASE_SCALE/2, -s.h*BASE_SCALE/2, s.w*BASE_SCALE, s.h*BASE_SCALE);
                } else if (s.type === 'circle') {
                    ctx.arc(0, 0, s.r*BASE_SCALE, 0, Math.PI*2);
                } else if (s.type === 'quarter') {
                    ctx.moveTo(0,0); ctx.arc(0, 0, s.r*BASE_SCALE, 0, Math.PI/2); ctx.closePath();
                } else if (s.type === 'sun') {
                    ctx.arc(0, 0, s.r*BASE_SCALE, 0, Math.PI*2);
                    ctx.stroke(); ctx.moveTo(0,0); ctx.lineTo(0, s.r*BASE_SCALE + 20); // Flecha
                } else if (s.type === 'text') {
                    ctx.fillStyle = '#1e293b'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText(s.label, 0, 0);
                }
                
                if (s.type !== 'text') { ctx.fill(); ctx.stroke(); }
                
                // Texto interno
                if (s.type !== 'text') {
                    ctx.fillStyle = '#1e293b'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
                    ctx.rotate(-s.angle * Math.PI / 180); ctx.fillText(s.label, 0, 4);
                }

                // Tirador de rotación
                if (i === selectedIndex) {
                    ctx.beginPath(); ctx.arc(0, -50, 8, 0, Math.PI*2); ctx.fillStyle = 'white'; ctx.fill(); ctx.stroke();
                }
                ctx.restore();
            });
            ctx.restore();
        }

        // --- INTERACCIÓN ---
        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            return { x: (e.clientX - r.left) / zoom / BASE_SCALE, y: (e.clientY - r.top) / zoom / BASE_SCALE };
        }

        canvas.onmousedown = (e) => {
            const pos = getPos(e);
            let hit = -1;
            
            // Check rotación primero
            if (selectedIndex >= 0) {
                const s = shapes[selectedIndex];
                const dx = pos.x - s.x, dy = pos.y - s.y;
                const d = Math.sqrt(dx*dx + dy*dy);
                if (d > 15 && d < 40) { isRotating = true; return; }
            }

            shapes.forEach((s, i) => {
                const d = Math.sqrt((pos.x-s.x)**2 + (pos.y-s.y)**2);
                if (d < 30) hit = i;
            });

            selectedIndex = hit;
            if (hit >= 0) {
                isDragging = true;
                dragOffset = { x: pos.x - shapes[hit].x, y: pos.y - shapes[hit].y };
                syncInputsToSelected();
            }
            draw();
        };

        window.onmousemove = (e) => {
            if (!isDragging && !isRotating) return;
            const pos = getPos(e);
            const s = shapes[selectedIndex];
            if (isDragging) {
                s.x = Math.round(pos.x - dragOffset.x);
                s.y = Math.round(pos.y - dragOffset.y);
            } else if (isRotating) {
                s.angle = Math.atan2(pos.y - s.y, pos.x - s.x) * 180 / Math.PI + 90;
            }
            draw();
        };

        window.onmouseup = () => { isDragging = isRotating = false; };

        function resetDefault() {
            shapes = [{ type: 'rect', x: 200, y: 200, w: 230, h: 310, label: 'Balcón', fill: 'rgba(200,200,200,0.3)', stroke: '#666', angle: 0 }];
            draw();
        }
        resetDefault();
    </script>
</body>
</html>
