<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Planner Pro - Willy Evrard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #canvas-container { flex: 1; position: relative; background-color: #f3f4f6; overflow: hidden; }
        .canvas-grid-bg {
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
        #properties-panel { display: none; transition: opacity 0.2s; }
        kbd { border: 1px solid #d1d5db; border-radius: 4px; padding: 1px 4px; background: white; font-size: 10px; }
    </style>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#4f46e5', 'primary-hover': '#4338ca' } } } }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <header class="bg-white shadow-sm border-b border-gray-200 z-10">
        <div class="max-w-full mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-gray-500 hover:text-primary transition"><i class="fas fa-arrow-left"></i></a>
                <h1 class="text-xl font-bold text-gray-900">Room Planner <span class="font-light text-gray-500">Pro</span></h1>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="saveDesign()" class="bg-white hover:bg-gray-100 text-gray-700 px-3 py-2 rounded-md border border-gray-300 text-sm flex items-center gap-2">
                    <i class="fas fa-save text-blue-600"></i> Guardar
                </button>
                <button onclick="document.getElementById('fileInput').click()" class="bg-white hover:bg-gray-100 text-gray-700 px-3 py-2 rounded-md border border-gray-300 text-sm flex items-center gap-2">
                    <i class="fas fa-folder-open text-yellow-600"></i> Cargar
                </button>
                <input type="file" id="fileInput" accept=".json" class="hidden" onchange="loadDesign(event)">
                <div class="h-6 w-px bg-gray-200 mx-1"></div>
                <button onclick="exportAsPNG()" class="bg-primary hover:bg-primary-hover text-white px-4 py-2 rounded-md text-sm flex items-center gap-2 shadow-sm">
                    <i class="fas fa-file-image"></i> Exportar PNG
                </button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col z-10 shadow-lg">
            <div class="flex-1 overflow-y-auto p-4 space-y-6">
                
                <div>
                    <h3 class="text-xs font-bold text-gray-400 uppercase mb-3">Estructura y Sol</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="addWallLine()" class="p-2 border rounded-lg hover:bg-indigo-50 text-xs font-medium flex flex-col items-center gap-1">
                            <i class="fas fa-grip-lines text-lg"></i> Pared
                        </button>
                        <button onclick="addSunOrientation()" class="p-2 border rounded-lg hover:bg-yellow-50 text-xs font-medium flex flex-col items-center gap-1">
                            <i class="fas fa-sun text-lg text-yellow-500"></i> Sol
                        </button>
                        <button onclick="addShape('roomfloor')" class="p-2 border rounded-lg hover:bg-indigo-50 text-xs font-medium flex flex-col items-center gap-1">
                            <i class="fas fa-vector-square text-lg"></i> Suelo
                        </button>
                        <button onclick="addRuler()" class="p-2 border rounded-lg hover:bg-indigo-50 text-xs font-medium flex flex-col items-center gap-1">
                            <i class="fas fa-ruler-horizontal text-lg"></i> Regla
                        </button>
                    </div>
                </div>

                <div>
                    <h3 class="text-xs font-bold text-gray-400 uppercase mb-3">Mobiliario</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="addShape('table')" class="p-2 border rounded-lg hover:bg-indigo-50 text-xs font-medium flex flex-col items-center gap-1">Mesa Rect.</button>
                        <button onclick="addShape('round_table')" class="p-2 border rounded-lg hover:bg-indigo-50 text-xs font-medium flex flex-col items-center gap-1">Mesa Circular</button>
                        <button onclick="addShape('sofa')" class="p-2 border rounded-lg hover:bg-indigo-50 text-xs font-medium flex flex-col items-center gap-1">Sofá</button>
                        <button onclick="addShape('bed')" class="p-2 border rounded-lg hover:bg-indigo-50 text-xs font-medium flex flex-col items-center gap-1">Cama</button>
                        <button onclick="addShape('chair')" class="p-2 border rounded-lg hover:bg-indigo-50 text-xs font-medium flex flex-col items-center gap-1">Silla / BBQ</button>
                    </div>
                </div>

                <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
                    <p class="text-[10px] text-blue-800 leading-tight">
                        <i class="fas fa-info-circle mr-1"></i> <b>Tip:</b> Haz doble click en cualquier bloque para editar su texto.
                    </p>
                </div>
            </div>

            <div class="p-4 border-t text-[10px] text-gray-400 space-y-1">
                <p><kbd>Click Fondo</kbd> + Arrastrar: Mover plano</p>
                <p><kbd>Alt</kbd> + Click Objeto: Forzar mover plano</p>
                <p><kbd>Supr</kbd>: Borrar objeto</p>
            </div>
        </aside>

        <main id="canvas-container" class="canvas-grid-bg">
            <canvas id="c"></canvas>

            <div id="properties-panel" class="absolute top-4 right-4 bg-white p-4 rounded-xl shadow-2xl border border-gray-200 z-20 w-64 opacity-0 pointer-events-none">
                <div class="flex items-center justify-between mb-4 border-b pb-2">
                    <h3 class="font-bold text-gray-800">Editar Bloque</h3>
                    <button onclick="deselectAll()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Color</label>
                        <div class="flex gap-2">
                            <input type="color" id="obj-color" oninput="updateObjectColor(this.value)" class="w-8 h-8 rounded border-0 cursor-pointer">
                            <input type="text" id="obj-color-text" class="flex-1 text-xs border-gray-300 rounded font-mono" readonly>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Texto Etiqueta</label>
                        <input type="text" id="obj-text-input" oninput="updateObjectText(this.value)" placeholder="Escribe aquí..." class="w-full text-sm border-gray-300 rounded-md focus:ring-primary focus:border-primary">
                    </div>

                    <div class="grid grid-cols-2 gap-2 pt-2">
                        <button id="btn-lock" onclick="toggleLockSelected()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-2 rounded-lg text-xs flex items-center justify-center gap-1 font-bold">
                            <i class="fas fa-lock" id="lock-icon"></i> <span id="lock-text">Fijar</span>
                        </button>
                        <button onclick="deleteSelected()" class="bg-red-50 hover:bg-red-100 text-red-600 px-3 py-2 rounded-lg text-xs flex items-center justify-center gap-1 font-bold">
                            <i class="fas fa-trash"></i> Borrar
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white/90 px-4 py-1.5 rounded-full shadow border border-gray-200 flex gap-4 text-xs font-bold text-gray-500 z-10">
                <button onclick="zoomOut()"><i class="fas fa-minus"></i></button>
                <span id="zoom-level">100%</span>
                <button onclick="zoomIn()"><i class="fas fa-plus"></i></button>
            </div>
        </main>
    </div>

    <script>
        const wrapper = document.getElementById('canvas-container');
        const canvas = new fabric.Canvas('c', {
            width: wrapper.clientWidth,
            height: wrapper.clientHeight,
            selection: true,
            preserveObjectStacking: true
        });

        let currentZoom = 1.0;
        const GRID = 20;

        // Estilo de controles
        fabric.Object.prototype.set({
            transparentCorners: false, cornerColor: '#4f46e5', cornerStrokeColor: '#4f46e5',
            borderColor: '#4f46e5', cornerSize: 8, cornerStyle: 'circle'
        });

        // --- CREACIÓN DE OBJETOS ---

        function addShape(type) {
            const center = getCanvasCenter();
            let shape;
            const common = { left: center.x, top: center.y, originX: 'center', originY: 'center', fill: '#ffffff', stroke: '#4f46e5', strokeWidth: 2 };

            switch(type) {
                case 'table': shape = new fabric.Rect({ ...common, width: 120, height: 80, label: 'Mesa' }); break;
                case 'round_table': shape = new fabric.Circle({ ...common, radius: 50, label: 'Mesa Circular' }); break;
                case 'chair': shape = new fabric.Circle({ ...common, radius: 20, fill: '#10b981', label: 'Silla/BBQ' }); break;
                case 'sofa': shape = new fabric.Rect({ ...common, width: 180, height: 70, rx: 10, ry: 10, fill: '#ec4899', label: 'Sofá' }); break;
                case 'bed': shape = new fabric.Rect({ ...common, width: 140, height: 190, rx: 5, ry: 5, fill: '#8b5cf6', label: 'Cama' }); break;
                case 'roomfloor': shape = new fabric.Rect({ ...common, width: 400, height: 300, fill: '#f8fafc', stroke: '#cbd5e1', label: 'Habitación' }); canvas.sendToBack(shape); break;
            }
            createGroupWithText(shape);
        }

        function createGroupWithText(shape) {
            const text = new fabric.IText(shape.label || 'Objeto', {
                fontSize: 14, originX: 'center', originY: 'center',
                left: shape.left, top: shape.top, fontFamily: 'Arial', fontWeight: 'bold'
            });
            const group = new fabric.Group([shape, text], {
                left: shape.left, top: shape.top, originX: 'center', originY: 'center',
                label: shape.label, customType: 'mueble'
            });
            addToCanvas(group);
        }

        function addWallLine() {
            const center = getCanvasCenter();
            const wall = new fabric.Rect({
                left: center.x, top: center.y, width: 200, height: 10, fill: '#1f2937', 
                originX: 'center', originY: 'center', label: 'Pared'
            });
            addToCanvas(wall);
        }

        function addRuler() {
            const center = getCanvasCenter();
            const body = new fabric.Rect({ width: 300, height: 20, fill: '#fef08a', stroke: '#ca8a04' });
            const label = new fabric.IText('300cm', { fontSize: 12, top: 4, left: 10, fontWeight: 'bold' });
            const ruler = new fabric.Group([body, label], {
                left: center.x, top: center.y, label: 'Regla', customType: 'regla'
            });
            // Permitir escalar solo el ancho para ajustar tamaño
            ruler.setControlsVisibility({ mt: false, mb: false, ml: true, mr: true });
            addToCanvas(ruler);
        }

        function addSunOrientation() {
            const center = getCanvasCenter();
            const circle = new fabric.Circle({ radius: 30, fill: '#fef3c7', stroke: '#fbbf24', strokeWidth: 2 });
            const ray = new fabric.Line([30, -10, 30, -40], { stroke: '#fbbf24', strokeWidth: 4 });
            const text = new fabric.IText('SOL / NORTE', { fontSize: 10, top: 10, left: 0, originX: 'center', fontWeight: 'bold' });
            const sun = new fabric.Group([circle, ray, text], {
                left: center.x, top: center.y, label: 'Sol', originX: 'center', originY: 'center'
            });
            addToCanvas(sun);
        }

        // --- LÓGICA DE TEXTO Y PROPIEDADES ---

        canvas.on('mouse:dblclick', function(options) {
            if (options.target && options.target.type === 'group') {
                const textObj = options.target.item(1);
                if (textObj && textObj instanceof fabric.IText) {
                    textObj.enterEditing();
                    canvas.setActiveObject(textObj);
                }
            }
        });

        function updateObjectText(val) {
            const obj = canvas.getActiveObject();
            if (!obj) return;
            // Si es grupo, el texto suele ser el item 1
            const target = obj.type === 'group' ? obj.item(1) : obj;
            if (target && target.setText) {
                target.set('text', val);
                canvas.renderAll();
            }
        }

        function updateObjectColor(color) {
            const obj = canvas.getActiveObject();
            if (!obj) return;
            const target = obj.type === 'group' ? obj.item(0) : obj;
            target.set(obj.type === 'line' ? 'stroke' : 'fill', color);
            document.getElementById('obj-color-text').value = color.toUpperCase();
            canvas.renderAll();
        }

        // --- SNAP Y PAN ---

        canvas.on('object:moving', (e) => {
            e.target.set({
                left: Math.round(e.target.left / GRID) * GRID,
                top: Math.round(e.target.top / GRID) * GRID
            });
        });

        let isPanning = false;
        canvas.on('mouse:down', function(opt) {
            if (!opt.target || opt.e.altKey || (opt.target && opt.target.locked)) {
                isPanning = true;
                this.selection = false;
                this.lastPosX = opt.e.clientX;
                this.lastPosY = opt.e.clientY;
            }
        });
        canvas.on('mouse:move', function(opt) {
            if (isPanning) {
                const vpt = this.viewportTransform;
                vpt[4] += opt.e.clientX - this.lastPosX;
                vpt[5] += opt.e.clientY - this.lastPosY;
                this.requestRenderAll();
                this.lastPosX = opt.e.clientX;
                this.lastPosY = opt.e.clientY;
            }
        });
        canvas.on('mouse:up', function() { isPanning = false; this.selection = true; });

        // --- SISTEMA DE SELECCIÓN ---

        canvas.on('selection:created', updatePanel);
        canvas.on('selection:updated', updatePanel);
        canvas.on('selection:cleared', () => { 
            const p = document.getElementById('properties-panel');
            p.style.opacity = '0'; p.style.pointerEvents = 'none';
        });

        function updatePanel() {
            const obj = canvas.getActiveObject();
            const p = document.getElementById('properties-panel');
            p.style.display = 'block';
            setTimeout(() => { p.style.opacity = '1'; p.style.pointerEvents = 'auto'; }, 10);
            
            const colorInput = document.getElementById('obj-color');
            const textInput = document.getElementById('obj-text-input');
            
            const mainShape = obj.type === 'group' ? obj.item(0) : obj;
            const mainText = obj.type === 'group' ? obj.item(1) : null;

            colorInput.value = mainShape.fill || '#000000';
            document.getElementById('obj-color-text').value = String(colorInput.value).toUpperCase();
            textInput.value = mainText ? mainText.text : (obj.text || "");
            
            const isLocked = obj.locked;
            document.getElementById('lock-text').innerText = isLocked ? "Desbloquear" : "Fijar";
            document.getElementById('btn-lock').className = isLocked ? "bg-red-600 text-white p-2 rounded-lg text-xs font-bold w-full" : "bg-gray-100 text-gray-700 p-2 rounded-lg text-xs font-bold w-full";
        }

        function toggleLockSelected() {
            const obj = canvas.getActiveObject();
            if (!obj) return;
            const newState = !obj.locked;
            obj.locked = newState;
            const props = ['lockMovementX', 'lockMovementY', 'lockRotation', 'lockScalingX', 'lockScalingY', 'hasControls'];
            props.forEach(p => obj[p] = newState);
            obj.set('stroke', newState ? '#ef4444' : (obj.item ? obj.item(0).stroke : '#4f46e5'));
            obj.set('strokeDashArray', newState ? [5, 5] : null);
            canvas.discardActiveObject();
            canvas.renderAll();
        }

        // --- UTILIDADES ---

        function getCanvasCenter() {
            const vpt = canvas.viewportTransform;
            return { x: (canvas.getWidth()/2 - vpt[4])/currentZoom, y: (canvas.getHeight()/2 - vpt[5])/currentZoom };
        }

        function addToCanvas(obj) {
            obj.toObject = (function(toObject) {
                return function(propertiesToInclude) {
                    return fabric.util.object.extend(toObject.call(this, propertiesToInclude), {
                        label: this.label, locked: this.locked, customType: this.customType
                    });
                };
            })(obj.toObject);
            canvas.add(obj);
            canvas.setActiveObject(obj);
        }

        function deleteSelected() {
            canvas.getActiveObjects().forEach(obj => { if(!obj.locked) canvas.remove(obj); });
            canvas.discardActiveObject().renderAll();
        }

        function zoomIn() { currentZoom *= 1.1; canvas.setZoom(currentZoom); updateZoomLevel(); }
        function zoomOut() { currentZoom /= 1.1; canvas.setZoom(currentZoom); updateZoomLevel(); }
        function updateZoomLevel() { document.getElementById('zoom-level').innerText = Math.round(currentZoom * 100) + '%'; }
        function deselectAll() { canvas.discardActiveObject().renderAll(); }

        function saveDesign() {
            const json = JSON.stringify(canvas.toJSON(['label', 'locked', 'customType', 'lockMovementX', 'lockMovementY', 'hasControls']));
            const blob = new Blob([json], { type: "application/json" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'mi_plano.json';
            a.click();
        }

        function loadDesign(e) {
            const reader = new FileReader();
            reader.onload = (f) => canvas.loadFromJSON(f.target.result, () => canvas.renderAll());
            reader.readAsText(e.target.files[0]);
        }

        function exportAsPNG() {
            deselectAll();
            setTimeout(() => {
                const dataURL = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 2 });
                const link = document.createElement('a');
                link.download = 'plano_willy.png';
                link.href = dataURL;
                link.click();
            }, 100);
        }

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
        });
    </script>
</body>
</html>
